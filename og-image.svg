<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f6ee"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#2bb369"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1080" cy="80" r="220" fill="#3ddc84" opacity="0.08"/>
  <circle cx="80" cy="550" r="160" fill="#3ddc84" opacity="0.06"/>

  <!-- Logo tile top-left -->
  <g transform="translate(70,60)">
    <rect width="72" height="72" rx="16" fill="url(#green)"/>
    <path d="M22 26h28l-3 32a5 5 0 0 1-5 4H30a5 5 0 0 1-5-4zM28 20a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4v4H28z" fill="white"/>
  </g>
  <text x="160" y="108" font-family="'Space Grotesk', sans-serif" font-size="40" font-weight="700" fill="#1a1f1c">gunoi.md</text>

  <!-- Main headline -->
  <text x="70" y="270" font-family="'Space Grotesk', sans-serif" font-size="92" font-weight="700" fill="#1a1f1c">Scăpăm de gunoiul tău.</text>
  <text x="70" y="370" font-family="'Space Grotesk', sans-serif" font-size="92" font-weight="700" fill="#2bb369">Azi sau mâine.</text>

  <!-- Sub -->
  <text x="70" y="430" font-family="'Inter', sans-serif" font-size="30" font-weight="400" fill="#5a635d">Mobilă, electrocasnice, deșeuri — încărcăm, curățăm, plătești la final.</text>

  <!-- Pills row -->
  <g transform="translate(70, 480)">
    <rect width="290" height="70" rx="35" fill="url(#green)"/>
    <text x="145" y="45" font-family="'Inter', sans-serif" font-size="28" font-weight="600" fill="white" text-anchor="middle">📞 +373 69 269 888</text>
  </g>

  <g transform="translate(390, 480)">
    <rect width="260" height="70" rx="35" fill="white" stroke="#2bb369" stroke-width="2"/>
    <text x="130" y="45" font-family="'Inter', sans-serif" font-size="24" font-weight="500" fill="#1a1f1c" text-anchor="middle">📍 Chișinău + suburbii</text>
  </g>

  <!-- Launch badge -->
  <g transform="translate(900, 260)">
    <rect width="240" height="100" rx="50" fill="#ffb454" transform="rotate(-8)"/>
    <text x="120" y="45" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#1a1f1c" text-anchor="middle" transform="rotate(-8)">-20%</text>
    <text x="120" y="75" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#1a1f1c" text-anchor="middle" transform="rotate(-8)">primii 10 clienți</text>
  </g>

  <!-- Truck illustration -->
  <g transform="translate(780, 400)">
    <!-- body -->
    <rect x="0" y="20" width="200" height="90" rx="8" fill="url(#green)"/>
    <rect x="200" y="50" width="70" height="60" rx="6" fill="#2bb369"/>
    <!-- window -->
    <rect x="210" y="58" width="52" height="30" rx="4" fill="#e8f6ee"/>
    <!-- wheels -->
    <circle cx="50" cy="120" r="20" fill="#1a1f1c"/>
    <circle cx="50" cy="120" r="8" fill="#5a635d"/>
    <circle cx="220" cy="120" r="20" fill="#1a1f1c"/>
    <circle cx="220" cy="120" r="8" fill="#5a635d"/>
    <!-- Stuff in truck -->
    <rect x="20" y="-5" width="40" height="30" rx="3" fill="#8a7a5c"/>
    <rect x="70" y="-15" width="50" height="40" rx="3" fill="#b89d6f"/>
    <rect x="130" y="0" width="45" height="25" rx="3" fill="#6a5a44"/>
    <!-- gunoi.md label on truck -->
    <text x="100" y="75" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">gunoi.md</text>
  </g>

  <!-- Footer strip -->
  <text x="70" y="590" font-family="'Inter', sans-serif" font-size="20" font-weight="500" fill="#5a635d">gunoi.md · Chișinău · Bon fiscal · Transport propriu</text>
</svg>
